<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Student Attendance App</title>
</head>
<body class="bg-gradient-to-r from-slate-900 via-cyan-800 to-emerald-700 flex items-center justify-center h-screen">

    <div class="backdrop-blur-md bg-slate-950/30 p-8 rounded-lg shadow-lg max-w-3xl w-full text-center">
        <h2 class="text-3xl font-bold text-cyan-50 drop-shadow-md">Student Attendance App | Awesome</h2>
<h4>This is new update and it should reflect on the web aafter CI/CD</h4>

        <input id="studentName" type="text" placeholder="Enter Student Name" 
            class="border border-cyan-100/40 bg-slate-900/30 backdrop-blur-lg text-cyan-50 p-3 rounded-md w-full mt-4 focus:outline-none focus:ring-2 focus:ring-emerald-200/60">
        
        <button onclick="registerStudent()" 
            class="mt-4 bg-emerald-500/40 text-cyan-50 px-6 py-3 rounded-lg shadow-md transition hover:bg-emerald-400/50">
            Register Student
        </button>

        <p id="successMessage" class="text-emerald-200 mt-4 hidden"></p>

        <h3 class="text-2xl mt-6 text-cyan-50 drop-shadow-md">Attendance Records</h3>
        <button onclick="fetchAttendance()" 
            class="bg-cyan-500/35 text-cyan-50 px-4 py-2 rounded-lg mt-2 transition hover:bg-cyan-400/45">
            Refresh
        </button>

        <div id="attendanceTable" class="mt-4"></div>
        <button onclick="location.href='/analytics'" class="mt-4 bg-cyan-500/35 text-cyan-50 px-6 py-3 rounded-lg shadow-md transition hover:bg-cyan-400/45">
            📊 View Analytics
        </button>
    </div>

    <script>
        function registerStudent() {
            let name = document.getElementById("studentName").value;
            fetch("/register_student", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("successMessage").textContent = data.message;
                document.getElementById("successMessage").classList.remove("hidden");
                document.getElementById("studentName").value = "";
                fetchAttendance();  // Refresh attendance records
            });
        }

        function fetchAttendance() {
            fetch("/get_attendance")
                .then(response => response.text())
                .then(html => {
                    document.getElementById("attendanceTable").innerHTML = html;
                });
        }

        function markAbsent(studentId) {
            fetch("/mark_absent", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ student_id: studentId })
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message); // Optional: Replace with better UI message
                fetchAttendance(); // Refresh attendance table
            });
        }
    </script>

</body>
</html>
