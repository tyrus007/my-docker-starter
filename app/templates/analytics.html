<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Attendance Analytics</title>
</head>
<body class="bg-gradient-to-r from-slate-900 via-cyan-800 to-emerald-700 flex items-center justify-center h-screen">

    <div class="backdrop-blur-md bg-slate-950/30 p-8 rounded-lg shadow-lg max-w-xl w-full text-center">
        <h2 class="text-3xl font-bold text-cyan-50 drop-shadow-md">📊 Attendance Analytics</h2>

        <div class="mt-4">
            <label class="text-cyan-50">Start Date:</label>
            <input type="date" id="startDate" class="bg-slate-900/30 text-cyan-50 p-2 rounded-lg">
            <label class="text-cyan-50 ml-2">End Date:</label>
            <input type="date" id="endDate" class="bg-slate-900/30 text-cyan-50 p-2 rounded-lg">
        </div>

        <div class="mt-4">
            <input type="text" id="studentName" placeholder="Enter Student Name (Optional)"
                class="bg-slate-900/30 text-cyan-50 p-2 rounded-lg w-full">
        </div>

        <button onclick="fetchAnalytics()"
            class="mt-4 bg-emerald-500/40 text-cyan-50 px-6 py-3 rounded-lg shadow-md transition hover:bg-emerald-400/50">
            🔍 Show Analytics
        </button>

        <canvas id="attendanceChart" class="mt-6"></canvas>
    </div>

    <script>
        function fetchAnalytics() {
            let startDate = document.getElementById("startDate").value;
            let endDate = document.getElementById("endDate").value;
            let studentName = document.getElementById("studentName").value;

            let url = `/attendance_stats?start_date=${startDate}&end_date=${endDate}`;
            if (studentName) {
                url += `&student_name=${studentName}`;
            }

            fetch(url)
                .then(response => response.json())
                .then(data => updateChart(data));
        }

        function updateChart(data) {
            let ctx = document.getElementById("attendanceChart").getContext("2d");
            let chartData = {
                labels: ["Present", "Absent"],
                datasets: [{
                    data: [data.Present, data.Absent],
                    backgroundColor: ["rgba(16, 185, 129, 0.7)", "rgba(8, 145, 178, 0.7)"],
                    borderColor: ["#10b981", "#0891b2"],
                    borderWidth: 1
                }]
            };

            new Chart(ctx, {
                type: "pie",
                data: chartData
            });
        }
    </script>

</body>
</html>
